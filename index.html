<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adellia Putri Fernanda - Cintaku ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff6b9d, #c44569, #f18f01, #ff9f43);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            overflow: hidden;
            position: relative;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            text-align: center;
            color: white;
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
        }
        
        .name {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fff, #ffd1dc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite alternate;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }
        
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #fff); }
            to { filter: drop-shadow(0 0 30px #ffd1dc); }
        }
        
        .love-text {
            font-size: 1.8rem;
            margin-bottom: 30px;
            animation: fadeInUp 2s ease;
            line-height: 1.4;
        }
        
        .big-heart {
            font-size: 8rem;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: block;
            margin: 20px 0;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .subtitle {
            font-size: 1.3rem;
            opacity: 0.9;
            margin-top: 20px;
            animation: fadeInUp 2s ease 0.5s both;
        }
        
        .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .heart-float {
            position: absolute;
            color: rgba(255,255,255,0.9);
            font-size: 1.8rem;
            animation: float 8s linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0);
                opacity: 1;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(720deg) scale(1);
                opacity: 0;
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .name { font-size: 3rem; }
            .love-text { font-size: 1.4rem; }
            .big-heart { font-size: 6rem; }
        }
    </style>
</head>
<body>
    <div class="hearts-bg" id="hearts"></div>
    
    <div class="container">
        <h1 class="name">Adellia Putri Fernanda</h1>
        <div class="big-heart">💖</div>
        <div class="love-text">
            Kamu adalah <strong>cahaya</strong> dalam hidupku,<br>
            <strong>Senyummu</strong> membuat dunia lebih indah,<br>
            <strong>Cintaku</strong> untukmu tak pernah berakhir! 💕
        </div>
        <div class="subtitle">
            Dibuat khusus untuk Adellia oleh orang yang paling sayang ✨<br>
            Klik mana saja untuk hati ajaib!
        </div>
    </div>

    <script>
        const hearts = ['💖', '💕', '💗', '💝', '🌸', '🌺', '✨', '⭐'];
        
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-float';
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
            heart.style.fontSize = (Math.random() * 0.8 + 1) + 'rem';
            document.getElementById('hearts').appendChild(heart);
            
            setTimeout(() => heart.remove(), 8000);
        }
        
        // Hati terus berjatuhan
        setInterval(createHeart, 200);
        
        // Klik untuk hati spesial
        document.addEventListener('click', function(e) {
            for(let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-float';
                    heart.innerHTML = '💖';
                    heart.style.left = (e.clientX + (i * 20)) + 'px';
                    heart.style.top = (e.clientY + (i * 20)) + 'px';
                    heart.style.animationDuration = '2s';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 2000);
                }, i * 100);
            }
        });
    </script>
</body>
</html>
