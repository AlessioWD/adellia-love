<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adellia Memories</title>
    <style>
        /* Minimal style - sama seperti sebelumnya */
        body{min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:grid;place-items:center;color:#fff;font-family:system-ui}
        .container{max-width:600px;text-align:center;padding:2rem}
        .letter{background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border-radius:20px;padding:3rem;border:1px solid rgba(255,255,255,.2)}
        .name{font-size:clamp(3rem,10vw,5rem);font-weight:700;margin-bottom:1rem;background:linear-gradient(135deg,#fff,#f0f0f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .reveal-btn{padding:1rem 2.5rem;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);border-radius:12px;color:#fff;font-weight:500;cursor:pointer;font-size:1.1rem;transition:all .3s ease}
        .reveal-btn:hover{transform:translateY(-3px);box-shadow:0 15px 30px rgba(0,0,0,.2)}
        .photo-modal{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;padding:2rem;z-index:1000}
        .photo-modal.active{display:flex;flex-direction:column}
        .photo{max-width:90vw;max-height:70vh;border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.7);animation:zoomIn 0.8s ease}
        @keyframes zoomIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
        .close{position:absolute;top:2rem;right:2rem;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.3);border:none;color:#fff;font-size:1.5rem;cursor:pointer}
        .photo-nav{position:absolute;bottom:2rem;display:flex;gap:1rem}
        .photo-nav button{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.3);border:none;color:#fff;font-size:1.2rem;cursor:pointer;transition:all .3s}
        .photo-nav button:hover{background:rgba(255,255,255,.5);transform:scale(1.1)}
    </style>
</head>
<body>
    <div class="container">
        <div class="letter">
            <h1 class="name">Adellia Putri Fernanda</h1>
            <p style="font-size:1.2rem;line-height:1.7;margin:2rem 0;font-weight:300">
                Aku simpan semua kenangan kita di sini.<br>
                Klik untuk melihat foto-foto spesial.
            </p>
            <button class="reveal-btn" onclick="openGallery()">Buka Galeri Kenangan</button>
        </div>
    </div>
    
    <!-- PHOTO GALLERY -->
    <div class="photo-modal" id="photoModal">
        <button class="close" onclick="closeGallery()">×</button>
        
        <!-- FOTO DARI FOLDER LOCAL -->
        <img id="currentPhoto" class="photo" src="images/foto1.jpg" alt="Kenangan">
        
        <div class="photo-nav">
            <button onclick="prevPhoto()">←</button>
            <span id="photoCounter">1 / 3</span>
            <button onclick="nextPhoto()">→</button>
        </div>
    </div>

    <script>
        // Daftar foto dari folder images/
        const photos = [
            'foto1.jpg',
            'foto2.jpg', 
        ];
        let currentPhotoIndex = 0;
        
        function openGallery() {
            document.getElementById('photoModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            showPhoto(currentPhotoIndex);
        }
        
        function closeGallery() {
            document.getElementById('photoModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        function showPhoto(index) {
            const img = document.getElementById('currentPhoto');
            img.src = photos[index];
            document.getElementById('photoCounter').textContent = `${index + 1} / ${photos.length}`;
            currentPhotoIndex = index;
        }
        
        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            showPhoto(currentPhotoIndex);
        }
        
        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            showPhoto(currentPhotoIndex);
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', e => {
            if(!document.getElementById('photoModal').classList.contains('active')) return;
            if(e.key === 'ArrowRight') nextPhoto();
            if(e.key === 'ArrowLeft') prevPhoto();
            if(e.key === 'Escape') closeGallery();
        });
    </script>
</body>
</html>
